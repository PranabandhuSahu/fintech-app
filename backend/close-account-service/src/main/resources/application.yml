server:
  port: 8084

spring:
  application:
    name: close-account-service
  datasource:
    url: jdbc:h2:mem:closeaccountdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: ${JWT_SECRET:my-very-secret-jwt-signing-key-for-nova-bank-demo-app}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.fintech.closeaccount: INFO
